<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Mitt första JS-spel</title>
    <style>
        body { font-family: sans-serif; text-align: center; marginTop: 50px; }
        input, button { padding: 10px; fontSize: 16px; }
    </style>
</head>
<body>

    <h1>Gissa numret!</h1>
    <p>Jag tänker på ett tal mellan 1 och 10. Gissa vilket!</p>

    <!-- Här skriver spelaren in sin gissning -->
    <input type="number" id="gissningInput" min="1" max="10">
    <button onclick="kollaGissning()">Gissa!</button>

    <!-- Här kommer resultatet att visas -->
    <p>Resultat=</p>
    <p id="resultatText"></p>
    <!-- Vi sparar texten och siffran i samma stycke, men ger siffran ett eget ID -->
    <p>Poäng: <span id="poang">0</span></p>
    <script src="/gissa-talet/spel-script.js"><script/>
</body>
</html>
